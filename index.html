<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALAK HACKS | KEY SYSTEM</title>
    <style>
        body { background: #050505; color: #0f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { width: 90%; max-width: 450px; border: 1px solid #0f0; border-radius: 20px; padding: 30px; text-align: center; background: rgba(0, 10, 0, 0.95); box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); position: relative; }
        h1 { font-size: 24px; letter-spacing: 3px; margin-bottom: 10px; text-shadow: 0 0 10px #0f0; }
        .status-bar { font-size: 12px; color: #555; margin-bottom: 20px; text-transform: uppercase; }
        .checkpoint-box { background: #000; border: 1px solid #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .timer-circle { width: 60px; height: 60px; border: 2px solid #0f0; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 15px; font-size: 20px; font-weight: bold; box-shadow: 0 0 10px #0f0; }
        .btn { display: block; width: 100%; padding: 15px; background: #0f0; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; text-decoration: none; }
        .btn:disabled { background: #111; color: #333; cursor: not-allowed; border: 1px solid #222; }
        .btn:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 20px #0f0; }
        .copy-box { display: none; background: #111; border: 1px dashed #0f0; padding: 15px; margin-top: 15px; font-size: 18px; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>MALAK HACKS</h1>
    <div class="status-bar">System Status: <span style="color: #0f0;">Online</span></div>

    <div id="setup-area">
        <div class="checkpoint-box">
            <div id="cp-text" style="margin-bottom: 10px;">Checkpoint: <span id="cp-num" style="color:#fff">1</span>/3</div>
            <div id="timer-display" class="timer-circle">10</div>
            <p id="instruction" style="font-size: 13px; color: #888;">اضغط على الزر واشترك في القناة لتجهيز المفتاح</p>
        </div>

        <button id="action-btn" class="btn" onclick="startCheckpoint()">GET KEY (CHECKPOINT 1)</button>
    </div>

    <div id="key-area" style="display: none;">
        <h2 style="color: #fff;">تم استخراج المفتاح!</h2>
        <p style="font-size: 13px;">انسخ المفتاح وضعه داخل الـ <span style="color:#0f0">Executor</span> في روبلوكس:</p>
        <div class="copy-box" id="key-display" onclick="copyKey()">MALAK-SECRET-994</div>
        <p style="font-size: 10px; color: #555; margin-top: 10px;">اضغط على الكود للنسخ</p>
    </div>
</div>

<script>
    let currentCP = 1;
    let timerValue = 10;
    let isWaiting = false;
    const ytLink = "https://youtube.com/@malaku_994?si=8mOxRBCY67r9zsfq";

    function startCheckpoint() {
        // يفتح اليوتيوب
        window.open(ytLink, '_blank');
        
        const btn = document.getElementById('action-btn');
        const tDisplay = document.getElementById('timer-display');
        
        btn.disabled = true;
        isWaiting = true;
        timerValue = 10;
        tDisplay.innerText = timerValue;

        const countdown = setInterval(() => {
            timerValue--;
            tDisplay.innerText = timerValue;
            
            if (timerValue <= 0) {
                clearInterval(countdown);
                isWaiting = false;
                btn.disabled = false;
                btn.innerText = "CONTINUE TO NEXT STEP";
                btn.onclick = nextStep;
            }
        }, 1000);
    }

    function nextStep() {
        currentCP++;
        if (currentCP <= 3) {
            document.getElementById('cp-num').innerText = currentCP;
            const btn = document.getElementById('action-btn');
            btn.innerText = `GET KEY (CHECKPOINT ${currentCP})`;
            btn.onclick = startCheckpoint;
            document.getElementById('timer-display').innerText = "10";
        } else {
            showFinalKey();
        }
    }

    function showFinalKey() {
        document.getElementById('setup-area').style.display = 'none';
        document.getElementById('key-area').style.display = 'block';
        document.getElementById('key-display').style.display = 'block';
    }

    function copyKey() {
        const key = document.getElementById('key-display').innerText;
        navigator.clipboard.writeText(key);
        alert("تم نسخ المفتاح! روح حطه في روبلوكس المهكرة.");
    }
</script>

</body>
</html>
