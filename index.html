<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALAK EXECUTOR | DELTA STYLE</title>
    <style>
        body { background: #050505; color: #0f0; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .executor-window { width: 95%; max-width: 700px; height: 450px; background: #111; border: 1px solid #0f0; border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 20px #0f0; }
        .top-bar { background: #000; padding: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #0f0; font-size: 12px; }
        .main-content { display: flex; flex: 1; }
        .side-tabs { width: 120px; background: #0a0a0a; border-right: 1px solid #222; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .tab-item { background: #1a1a1a; padding: 8px; font-size: 11px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; overflow: hidden; text-overflow: ellipsis; }
        .tab-item.active { border-color: #0f0; background: #053305; }
        .editor-area { flex: 1; padding: 10px; display: flex; flex-direction: column; }
        textarea { flex: 1; background: #000; color: #0f0; border: 1px solid #222; padding: 10px; font-family: monospace; resize: none; outline: none; border-radius: 5px; }
        .bottom-btns { padding: 10px; display: flex; gap: 10px; background: #000; }
        button { background: #0f0; color: #000; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button.secondary { background: #222; color: #0f0; border: 1px solid #0f0; }
        input#scriptName { background: #000; border: 1px solid #333; color: #0f0; padding: 5px; font-size: 11px; margin-bottom: 5px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="executor-window">
    <div class="top-bar">
        <span>MALAK SYSTEM V2 (DELTA MODE)</span>
        <span>STATUS: <span style="color: yellow;">READY</span></span>
    </div>
    
    <div class="main-content">
        <div class="side-tabs" id="tabsContainer">
            <div class="tab-item active" onclick="selectTab(0)">Script 1</div>
        </div>
        
        <div class="editor-area">
            <input type="text" id="scriptName" placeholder="اسم السكربت (مثلاً: Fly)...">
            <textarea id="editor" placeholder="-- ضع سكربت روبلوكس هنا..."></textarea>
        </div>
    </div>
    
    <div class="bottom-btns">
        <button onclick="execute()">EXECUTE</button>
        <button class="secondary" onclick="addNewTab()">ADD TAB (+)</button>
        <button class="secondary" onclick="clearEditor()">CLEAR</button>
    </div>
</div>

<script>
    let scripts = [{ name: "Script 1", content: "" }];
    let currentTab = 0;

    function selectTab(index) {
        scripts[currentTab].content = document.getElementById('editor').value;
        currentTab = index;
        document.getElementById('editor').value = scripts[index].content;
        document.getElementById('scriptName').value = scripts[index].name;
        renderTabs();
    }

    function addNewTab() {
        scripts.push({ name: "New Script", content: "" });
        selectTab(scripts.length - 1);
    }

    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        container.innerHTML = "";
        scripts.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `tab-item ${i === currentTab ? 'active' : ''}`;
            div.innerText = s.name;
            div.onclick = () => selectTab(i);
            container.appendChild(div);
        });
    }

    function execute() {
        const code = document.getElementById('editor').value;
        const name = document.getElementById('scriptName').value;
        scripts[currentTab].name = name || "Unnamed";
        renderTabs();
        
        if(!code) return alert("سيدي/تي، ضع الكود أولاً!");
        
        alert("تم إرسال سكربت [" + scripts[currentTab].name + "] للتنفيذ بنجاح!");
        // هنا يتم ربط الكود بـ API الهاك إذا كان لديك حاقن
    }

    function clearEditor() {
        document.getElementById('editor').value = "";
    }
</script>

</body>
</html>
